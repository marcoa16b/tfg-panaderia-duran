# Use this override file to run the app in prod mode with Neon Postgres and redis
#     docker compose -f compose.yaml -f compose.prod.yaml up -d
services:
  redis:
    image: redis
    restart: always

  app:
    environment:
      DATABASE_URL: ${NEON_DB}
      REFLEX_DB_URL: ${NEON_DB}
      REFLEX_REDIS_URL: redis://redis:6379
    depends_on:
      - redis
