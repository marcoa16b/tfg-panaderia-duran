services:
  app:
    image: local/reflex-app
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      REFLEX_DB_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@db/postgres
      REFLEX_REDIS_URL: redis://redis:6379
    volumes:
      - db-data:/app/data
      - upload-data:/app/uploaded_files
    restart: always
    depends_on:
      - db
      - redis

  webserver:
    build:
      context: .
      dockerfile: Caddy.Dockerfile
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - caddy-data:/root/.caddy
    restart: always
    depends_on:
      - app

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: always

volumes:
  db-data:
  upload-data:
  caddy-data:
  postgres-data: